# Hysteria2 Redirector - Video Streaming Masquerade
# Deploys on public-facing VPS masquerading as YouTube/Netflix

listen: :443

# TLS Configuration
tls:
  mode: acme
  domains: 
    - "stream-media-platform.com"
    - "www.stream-media-platform.com"
  email: "admin@stream-media-platform.com"

# Obfuscation
obfs:
  type: salamander
  password: "StreamMedia2024SecurePass"

# Masquerade as YouTube
masquerade:
  type: proxy
  proxy:
    url: https://www.youtube.com
    rewriteHost: true
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8"
      Accept-Language: "en-US,en;q=0.9"
      Accept-Encoding: "gzip, deflate, br"
      DNT: "1"
      Connection: "keep-alive"
      Upgrade-Insecure-Requests: "1"
      Sec-Fetch-Dest: "document"
      Sec-Fetch-Mode: "navigate"
      Sec-Fetch-Site: "none"
      Sec-Fetch-User: "?1"

# Traffic Stats API
trafficStats:
  listen: :25000
  secret: "StreamingTrafficSecret2024"

# Authentication - Forward to teamserver
auth:
  type: http
  http:
    url: https://teamserver.example.com/api/hysteria/auth
    insecure: false

# High bandwidth for streaming appearance
bandwidth:
  up: "500 Mbps"
  down: "2 Gbps"

# QUIC configuration for video streaming
quic:
  initStreamReceiveWindow: 134217728
  maxStreamReceiveWindow: 268435456
  initConnReceiveWindow: 268435456
  maxConnReceiveWindow: 536870912
  maxIdleTimeout: 120s
  keepAlivePeriod: 45s
  disablePathMTUDiscovery: false

# Streaming-specific ACL
acl:
  file: /etc/hysteria/acl-streaming.conf